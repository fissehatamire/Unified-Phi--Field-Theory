<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unified Phi Field Theory ¢ HD Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 24px;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
        }
        .subtitle {
            color: #64748b;
            font-size: 0.95rem;
            border-bottom: 1px solid #e9edf2;
            padding-bottom: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .subtitle a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }
        #pdf-container {
            width: 100%;
            min-height: 600px;
            background: #eef2f7;
            border-radius: 10px;
            overflow: auto; /* Allows scrolling if canvas is huge */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
        }
        #pdf-canvas {
            display: block;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            /* Size is set dynamically by JavaScript to match container width */
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
            color: #475569;
            font-size: 1.1rem;
            gap: 12px;
            width: 100%;
        }
        .spinner {
            width: 30px;
            height: 30px;
            border: 4px solid #dbe0e8;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .controls {
            margin-top: 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }
        .controls .nav {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .controls button {
            background: #f1f4f9;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
            transition: 0.2s;
        }
        .controls button:hover:not(:disabled) {
            background: #dbe0e8;
        }
        .controls button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .controls .page-info {
            font-size: 0.95rem;
            color: #334155;
            min-width: 80px;
            text-align: center;
        }
        .error-msg {
            background: #fee2e2;
            color: #991b1b;
            padding: 20px;
            border-radius: 10px;
            display: none;
            width: 100%;
            text-align: center;
        }
        .error-msg a {
            color: #2563eb;
        }
        @media (max-width: 640px) {
            .container { padding: 16px; }
            #pdf-container { min-height: 400px; padding: 4px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1> Unified Phi Field Theory</h1>
    <div class="subtitle">
        <span>TSL-SCIPU Ę HD Render</span>
        <a href="https://fissehatamire.github.io/Unified-Phi-Field-Theory-IP/TSL-SCIPU.pdf" target="_blank" rel="noopener">
             Open Original PDF
        </a>
    </div>

    <div id="pdf-container">
        <div id="loading-indicator" class="loading">
            <div class="spinner"></div>
            <span>Loading PDFģ</span>
        </div>
        <canvas id="pdf-canvas" style="display: none;"></canvas>
        <div id="error-msg" class="error-msg">
             Could not load the PDF. The server may be unreachable.
            <br />
            Try the <a href="https://fissehatamire.github.io/Unified-Phi-Field-Theory-IP/TSL-SCIPU.pdf" target="_blank">direct link</a> instead.
        </div>
    </div>

    <div class="controls" id="controls" style="display: none;">
        <div class="nav">
            <button id="prev-page" disabled> Previous</button>
            <span class="page-info" id="page-info">1 / 1</span>
            <button id="next-page" disabled>Next </button>
        </div>
        <span style="font-size:0.85rem; color:#64748b;">Rendered at high-DPI (crisp text)</span>
    </div>
</div>

<script>
    (function() {
        const PDF_URL = 'https://fissehatamire.github.io/Unified-Phi-Field-Theory-IP/TSL-SCIPU.pdf';
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const loadingEl = document.getElementById('loading-indicator');
        const errorEl = document.getElementById('error-msg');
        const controlsEl = document.getElementById('controls');
        const prevBtn = document.getElementById('prev-page');
        const nextBtn = document.getElementById('next-page');
        const pageInfo = document.getElementById('page-info');
        const container = document.getElementById('pdf-container');

        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;

        function renderPage(pageNum) {
            if (!pdfDoc) return;

            pdfDoc.getPage(pageNum).then(page => {
                // 1. Get the usable width of the container (minus padding)
                const containerWidth = container.clientWidth - 20; 

                // 2. Get the page's original aspect ratio
                const viewport = page.getViewport({ scale: 1 });
                const baseScale = containerWidth / viewport.width;

                // 3. CRITICAL FIX FOR BLUR: Multiply scale by device pixel ratio (Retina / HD)
                const pixelRatio = window.devicePixelRatio || 1;
                // Cap the pixel ratio at 2.5 to avoid performance issues on very high-end screens
                const renderScale = baseScale * Math.min(pixelRatio, 2.5);

                // 4. Create the render viewport
                const renderViewport = page.getViewport({ scale: renderScale });

                // 5. Set canvas internal resolution (actual pixels)
                canvas.width = renderViewport.width;
                canvas.height = renderViewport.height;

                // 6. Set canvas CSS size (logical pixels) to perfectly fit the container width.
                //    Dividing by pixelRatio ensures the browser doesn't stretch it, keeping it sharp.
                canvas.style.width = (renderViewport.width / pixelRatio) + 'px';
                canvas.style.height = (renderViewport.height / pixelRatio) + 'px';

                // 7. Render the page
                const renderContext = {
                    canvasContext: ctx,
                    viewport: renderViewport,
                };

                page.render(renderContext).promise.then(() => {
                    pageInfo.textContent = `${pageNum} / ${totalPages}`;
                    prevBtn.disabled = (pageNum <= 1);
                    nextBtn.disabled = (pageNum >= totalPages);
                }).catch(err => {
                    console.warn('Render error:', err);
                    showError();
                });

            }).catch(err => {
                console.warn('Page fetch error:', err);
                showError();
            });
        }

        function showError() {
            loadingEl.style.display = 'none';
            canvas.style.display = 'none';
            errorEl.style.display = 'block';
            controlsEl.style.display = 'none';
        }

        function loadPDF() {
            loadingEl.style.display = 'flex';
            canvas.style.display = 'none';
            errorEl.style.display = 'none';
            controlsEl.style.display = 'none';

            pdfjsLib.getDocument(PDF_URL).promise
                .then(doc => {
                    pdfDoc = doc;
                    totalPages = doc.numPages;
                    currentPage = 1;

                    loadingEl.style.display = 'none';
                    canvas.style.display = 'block';
                    controlsEl.style.display = 'flex';

                    renderPage(currentPage);
                })
                .catch(err => {
                    console.error('PDF load error:', err);
                    showError();
                });
        }

        // Navigation
        prevBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderPage(currentPage);
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentPage < totalPages) {
                currentPage++;
                renderPage(currentPage);
            }
        });

        // Re-render on resize (debounced)
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (pdfDoc) renderPage(currentPage);
            }, 250);
        });

        loadPDF();
    })();
</script>

</body>
</html>
